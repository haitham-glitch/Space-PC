<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - SPACE PC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <ul class="nav-links">
           <li><a href="index.html">Home</a></li>
           <li><a href="index.html#">Top Builds</a></li>
           <li><a href="about.html">About Us</a></li>
           <li><a href="login.html">Login</a></li>
           <li><a href="signup.html" class="active">Signup</a></li>
        </ul>
    </nav>

    <section class="container" style="margin-top: 100px;">
        <article class="content-box">
            <h2 style="text-align: center;">Create a New Account</h2>
            <form action="#" method="POST" class="advice-form" style="margin: 0 auto; max-width: 500px;" id="signupForm">
                <label for="fullname">Full Name:</label>
                <input type="text" id="fullname" name="fullname" required>

                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" required>
                
                <label for="new-password">Password:</label>
                <input type="password" id="new-password" name="new-password" required>

                <label for="confirm-password">Confirm Password:</label>
                <input type="password" id="confirm-password" name="confirm-password" required>
                
                <button type="submit" class="btn">Sign Up</button>
            </form>
        </article>
    </section>

</body>
</html>
